name: describe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - CATALOG.md
      - logo.*
      - mirror.yml
      - .github/workflows/describe.yml

concurrency:
  group: mirror-${{ github.workflow }}-describe
  cancel-in-progress: false

jobs:
  describe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      # Detect whether registry credentials are configured.
      # GitHub does not allow `secrets.*` in job-level `if:`, so we probe at
      # step level via env-var injection (secret value never echoed to logs).
      - name: Detect registry credentials
        id: creds
        env:
          OCX_MIRROR_REGISTRY_TOKEN: ${{ secrets.OCX_MIRROR_REGISTRY_TOKEN }}
        run: |
          if [ -n "${OCX_MIRROR_REGISTRY_TOKEN}" ]; then
            echo "have=true" >> "${GITHUB_OUTPUT}"
          else
            echo "have=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::No OCX_MIRROR_REGISTRY_TOKEN secret — registry push skipped (repo runs in test/validation mode)."
          fi
      # Docker login lets ocx pick credentials via its native-credential
      # fallback (`get_docker_auth` in crates/ocx_lib/src/auth.rs). Env-var
      # auth (`OCX_AUTH_<REG>_USER/_TOKEN`) takes precedence inside ocx, so do
      # NOT also export those vars here.
      - name: Login to {TARGET_REGISTRY}
        if: ${{ steps.creds.outputs.have == 'true' }}
        run: |
          echo "${{ secrets.OCX_MIRROR_REGISTRY_TOKEN }}" \
            | docker login {TARGET_REGISTRY} \
                -u "${{ secrets.OCX_MIRROR_REGISTRY_USER }}" \
                --password-stdin
      - name: Publish catalog metadata
        if: ${{ steps.creds.outputs.have == 'true' }}
        run: |
          ocx-mirror pipeline describe
