# Mirror spec: pylock source fixture with a second, named `musl` variant
# carrying its own `interpreter_package` override (prepare.rs per-variant
# interpreter dependency tests). Reuses pylock-pycowsay.toml — the lock
# content is irrelevant to interpreter resolution, only the variant/python
# shape matters here.
name: pycowsay
target:
  registry: ocx.sh
  repository: pycowsay

source:
  type: pylock
  path: pylock-pycowsay.toml

python:
  version: "3.13.1"
  abi: cp313
  interpreter_package: "ocx.sh/python/cpython:3.13.1"

variants:
  - default: true
    libc: gnu
    min_manylinux: "2_28"
  - name: musl
    libc: musl
    min_musllinux: "1_2"
    interpreter_package: "ocx.sh/python/cpython-musl:3.13.1"

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
