# Mirror spec: windows/arm64-bearing mirror topology (mirrors cmake/uv pattern).
# Covers the currently-shipping ARM Windows tile.
name: uv
target:
  registry: ocx.sh
  repository: uv

source:
  type: github_release
  owner: astral-sh
  repo: uv
  tag_pattern: "^(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "uv-x86_64-unknown-linux-musl\\.tar\\.gz$"
  linux/arm64:
    - "uv-aarch64-unknown-linux-musl\\.tar\\.gz$"
  darwin/amd64:
    - "uv-x86_64-apple-darwin\\.tar\\.gz$"
  darwin/arm64:
    - "uv-aarch64-apple-darwin\\.tar\\.gz$"
  windows/amd64:
    - "uv-x86_64-pc-windows-msvc\\.zip$"
  windows/arm64:
    - "uv-aarch64-pc-windows-msvc\\.zip$"

asset_type:
  type: archive
  strip_components: 1

skip_prereleases: true
cascade: true
build_timestamp: none

tests:
  - name: version
    command: uv --version

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/arm64:
    runner: macos-latest
    shell: bash
  darwin/amd64:
    runner: macos-latest
    prefix: ["arch", "-x86_64"]
  windows/amd64:
    runner: windows-latest
    shell: pwsh
    tests:
      - name: version
        command: uv.exe --version
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh
    tests:
      - name: version
        command: uv.exe --version

ocx_mirror:
  release_tag: v0.7.2
