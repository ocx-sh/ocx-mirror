# Mirror spec: literal Discord webhook URL in webhook_secret — NEGATIVE fixture.
# Renderer must exit 64 (UsageError) before writing any files. R3 mitigation.
name: shfmt
target:
  registry: ocx.sh
  repository: shfmt

source:
  type: github_release
  owner: mvdan
  repo: sh
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shfmt_v.*_linux_amd64$"

asset_type:
  type: binary
  name: shfmt

tests:
  - name: version
    command: shfmt --version

platforms:
  linux/amd64:
    runner: ubuntu-latest

ocx_mirror:
  release_tag: v0.7.2

notify:
  discord:
    # This is a literal Discord URL — must be rejected by validator (R3)
    webhook_secret: "https://discord.com/api/webhooks/1234567890/secrettoken"
