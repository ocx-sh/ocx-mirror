# Mirror spec fixture: one test entry of each kind (command, script, script_inline).
# Used by ci.rs render tests to verify the 3-way union renders correctly.
name: shfmt
target:
  registry: ocx.sh
  repository: shfmt

source:
  type: github_release
  owner: mvdan
  repo: sh
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shfmt_v.*_linux_amd64$"

asset_type:
  type: binary
  name: shfmt

skip_prereleases: true
cascade: true

tests:
  - name: version
    command: shfmt --version
  - name: smoke
    script: tests/smoke.star
  - name: inline
    script_inline: |
      ocx_assert(ocx_exec(["shfmt", "--version"]).returncode == 0)

platforms:
  linux/amd64:
    runner: ubuntu-latest

ocx_mirror:
  release_tag: v0.7.2
