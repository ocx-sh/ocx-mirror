# Mirror spec: linux/amd64 with 3 containers (ubuntu/alpine/fedora).
# Tests the AND-across-containers logic and shell default inference.
name: shfmt
target:
  registry: ocx.sh
  repository: shfmt

source:
  type: github_release
  owner: mvdan
  repo: sh
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shfmt_v.*_linux_amd64$"

asset_type:
  type: binary
  name: shfmt

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  poll_interval: "0 */6 * * *"

tests:
  - name: version
    command: shfmt --version
  - name: smoke
    command: bash ./tests/smoke.sh

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: ubuntu:24.04
        shell: bash
      - image: alpine:3.20
        shell: sh
      - image: fedora:40
        shell: bash

ocx_mirror:
  release_tag: v0.7.2

notify:
  discord:
    webhook_secret: DISCORD_WEBHOOK_URL
