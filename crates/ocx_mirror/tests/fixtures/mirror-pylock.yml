# Mirror spec: pylock source fixture for plan-phase unit tests (W2.2).
# Pairs with pylock-pycowsay.toml (committed alongside). Env tags are bare;
# per-platform wheel selection is declared via the `wheels:` map (value ~ =
# key-derived default filter).
name: pycowsay
target:
  registry: ocx.sh
  repository: pycowsay

source:
  type: pylock
  path: pylock-pycowsay.toml

python:
  version: "3.13.1"
  abi: cp313
  interpreter_package: "ocx.sh/python/cpython:3.13.1"

wheels:
  linux/amd64: ~
  linux/arm64: ~

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
