# Mirror spec: source: url_index with generator command.
# Covers the mirrors/corretto / mirrors/cpython topology (generator-backed).
name: nodejs
target:
  registry: ocx.sh
  repository: nodejs

source:
  type: url_index
  generator:
    command: ["uv", "run", "generate.py"]
    working_directory: scripts

assets:
  linux/amd64:
    - "node-.*-linux-x64\\.tar\\.xz"
  linux/arm64:
    - "node-.*-linux-arm64\\.tar\\.xz"
  darwin/arm64:
    - "node-.*-darwin-arm64\\.tar\\.gz"
  darwin/amd64:
    - "node-.*-darwin-x64\\.tar\\.gz"
  windows/amd64:
    - "node-.*-win-x64\\.zip"

asset_type:
  type: archive
  strip_components: 1

skip_prereleases: true
cascade: true

tests:
  - name: version
    command: node --version
  - name: npm-version
    command: npm --version

platforms:
  linux/amd64:
    runner: ubuntu-latest
  darwin/arm64:
    runner: macos-latest
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
    tests:
      - name: version
        command: node.exe --version
      - name: npm-version
        command: npm.cmd --version

ocx_mirror:
  release_tag: v0.7.2

notify:
  discord:
    webhook_secret: DISCORD_WEBHOOK_URL
