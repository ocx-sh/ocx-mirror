[package]
name = "ocx_mirror"
edition = "2024"
license.workspace = true
publish = false
version.workspace = true

[[bin]]
name = "ocx-mirror"
path = "src/main.rs"

[dependencies]
ocx_lib = { workspace = true, features = ["progress"] }
tokio = { workspace = true }

clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
chrono = "0.4"
glob = "0.3"
regex = "1"
url = { version = "2", features = ["serde"] }
octocrab = { version = "0.49", default-features = false, features = [
    "default-client",
    "follow-redirect",
    "jwt-aws-lc-rs",
    "retry",
    "rustls",
    "rustls-aws-lc-rs",
    "timeout",
    "tracing",
] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-webpki-roots-no-provider", "json"] }
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs", "std"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = "3"

[lints]
workspace = true
