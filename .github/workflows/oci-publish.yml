name: OCI Publish

# Reusable workflow that publishes the bare-binary build artifacts from
# build-matrix.yml to an OCI registry as the `<repo>/mirror` OCX package.
# Called by `deploy-dev.yml` (rolling dev publishes to dev.ocx.sh) and
# `release.yml` (tag-driven releases to ocx.sh).
#
# Simplified copy of ocx's oci-publish.yml: single variant (ocx-mirror), the
# pushing `ocx` CLI comes from setup-ocx instead of same-run build artifacts
# (this repo never builds ocx).

on:
  workflow_call:
    inputs:
      registry:
        description: Registry hostname (e.g. `dev.ocx.sh`, `ocx.sh`).
        required: true
        type: string
      version_tag:
        description: Fully formed publish tag, including any pre-release and UTC
          build-metadata segments (e.g. `0.4.0-dev_20260612120000`). Callers
          freeze the build-metadata segment once per workflow run so every
          target leg of the publish loop shares the same tag.
        required: true
        type: string
      environment:
        description: GitHub Environment whose secrets gate the publish.
        required: true
        type: string
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ocx-mirror-*
          path: dist/
          merge-multiple: true

      - name: Setup OCX
        uses: ocx-sh/setup-ocx@8cd2f38eed07c9b79aaed22e61f9ba6b36e967a3 # v1.2.2
        with:
          version: "0.3.7"

      - name: Publish to registry
        env:
          REGISTRY: ${{ inputs.registry }}
          VERSION_TAG: ${{ inputs.version_tag }}
          OCX_AUTH_REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          OCX_AUTH_REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Validate registry before using it in dynamic export — prevents
          # command substitution injection via shell metacharacters.
          if ! [[ "${REGISTRY}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::registry '${REGISTRY}' contains invalid characters"
            exit 1
          fi
          case "$REGISTRY" in
            dev.ocx.sh|ocx.sh) ;;
            *) echo "::error::registry '$REGISTRY' not in allowlist"; exit 1 ;;
          esac

          # Map secrets to the registry-specific env names ocx reads.
          # Hostname dots become underscores in OCX_AUTH_<host>_USER/TOKEN.
          auth_key="$(echo "${REGISTRY}" | tr '.' '_')"
          export "OCX_AUTH_${auth_key}_USER=${OCX_AUTH_REGISTRY_USER}"
          export "OCX_AUTH_${auth_key}_TOKEN=${OCX_AUTH_REGISTRY_TOKEN}"

          declare -A PLATFORM_MAP=(
            ["x86_64-unknown-linux-musl"]="linux/amd64"
            ["aarch64-unknown-linux-musl"]="linux/arm64"
            ["x86_64-apple-darwin"]="darwin/amd64"
            ["aarch64-apple-darwin"]="darwin/arm64"
            ["x86_64-pc-windows-msvc"]="windows/amd64"
            ["aarch64-pc-windows-msvc"]="windows/arm64"
          )

          METADATA="packaging/metadata.json"

          for target in "${!PLATFORM_MAP[@]}"; do
            platform="${PLATFORM_MAP[$target]}"
            ext=""
            [[ "$target" == *windows* ]] && ext=".exe"
            SRC="dist/ocx-mirror-${target}${ext}"
            if [[ ! -f "$SRC" ]]; then
              echo "::error::missing artifact $SRC"
              exit 1
            fi

            WORK="$(mktemp -d)"
            mkdir -p "$WORK/repackage/bin"
            install -m 0755 "$SRC" "$WORK/repackage/bin/ocx-mirror${ext}"

            ARCHIVE="$WORK/ocx-mirror-${target}.tar.xz"
            ocx package create "$WORK/repackage" \
              -m "$METADATA" \
              -o "$ARCHIVE" \
              -p "$platform"

            identifier="${REGISTRY}/ocx/mirror:${VERSION_TAG}"
            echo "==> Publishing ${identifier} (${platform})"
            ocx package push \
              --identifier "${identifier}" \
              --platform "${platform}" \
              --cascade \
              --new \
              --metadata "${METADATA}" \
              "$ARCHIVE"

            rm -rf "$WORK"
          done

          # Repository-level catalog description (__ocx.desc tag) — README from
          # CATALOG.md (frontmatter supplies title/description/keywords) plus
          # the project logo. Version-independent; refreshed on every publish.
          echo "==> Pushing catalog description for ${REGISTRY}/ocx/mirror"
          ocx package describe \
            --readme CATALOG.md \
            --logo assets/logo.svg \
            "${REGISTRY}/ocx/mirror"
