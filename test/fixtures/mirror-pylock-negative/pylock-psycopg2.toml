# PEP 751 lock fixture: app package "psycopg2" ships wheels, but none for
# linux/amd64 — only macOS arm64 and Windows amd64. Negative case (W2.6): the
# "no wheel for THIS target triple" shape (real psycopg2 has no manylinux
# wheel; users build from source against libpq), distinct from the
# no-wheel-anywhere shape in pylock-uwsgi.toml.
lock-version = "1.0"

[[packages]]
name = "psycopg2"
version = "2.9.9"

[[packages.wheels]]
name = "psycopg2-2.9.9-cp313-cp313-macosx_11_0_arm64.whl"
url = "https://files.pythonhosted.org/packages/aa/bb/psycopg2-2.9.9-cp313-cp313-macosx_11_0_arm64.whl"
hashes = { sha256 = "1111111111111111111111111111111111111111111111111111111111aaaa" }

[[packages.wheels]]
name = "psycopg2-2.9.9-cp313-cp313-win_amd64.whl"
url = "https://files.pythonhosted.org/packages/cc/dd/psycopg2-2.9.9-cp313-cp313-win_amd64.whl"
hashes = { sha256 = "2222222222222222222222222222222222222222222222222222222222bbbb" }
